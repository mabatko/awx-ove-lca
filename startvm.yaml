---
- name: Start OpenShift VM
  hosts: localhost
  gather_facts: false
  vars:
    vm_namespace: default
    vm_name: dummy-name

  tasks:
    - name: Start VirtualMachine
      ansible.builtin.uri:
        url: "{{ lookup('ansible.builtin.env', 'K8S_AUTH_HOST') }}/apis/subresources.kubevirt.io/v1/namespaces/{{ vm_namespace }}/virtualmachines/{{ vm_name }}/start"
        method: PUT
        headers:
          Authorization: "Bearer {{ lookup('ansible.builtin.env', 'K8S_AUTH_KEY') }}"
          Content-Type: "application/json"
        validate_certs: false
        return_content: true
        status_code:
          - 200
          - 202
          - 204
      register: vm_start_result

    - name: Show start result
      ansible.builtin.debug:
        var: vm_start_result
