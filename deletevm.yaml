---
- name: Delete OpenShift VM
  hosts: localhost
  gather_facts: false
  vars:
    vm_namespace: default
    vm_name: dummy-name

  tasks:
    - name: print token
      debug:
        var: "{{ lookup('ansible.builtin.env', 'K8S_AUTH_API_KEY') }}"

    - name: Print env
      ansible.builtin.command: env
      register: env_out

    - name: Debug env
      ansible.builtin.debug:
        var: env_out.stdout_lines
        
    - name: Delete VirtualMachine
      ansible.builtin.uri:
        url: "{{ lookup('ansible.builtin.env', 'K8S_AUTH_HOST') }}/apis/subresources.kubevirt.io/v1/namespaces/{{ vm_namespace }}/virtualmachines/{{ vm_name }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ lookup('ansible.builtin.env', 'K8S_AUTH_API_KEY') }}"
          Content-Type: "application/json"
        validate_certs: false
        return_content: true
        status_code:
          - 200
          - 202
          - 204
      register: vm_delete_result

    - name: Show delete result
      ansible.builtin.debug:
        var: vm_delete_result
